name: Deployment phase

on:
  push:
    branches: [srijan]
     #workflow_run:
      # workflows: ["docker-build-push"]
    #type: [completed]
   #workflow_dispatch:


jobs:

  deployment-phase:
    runs-on: self-hosted
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4

# synchronization branches
      #- name: synchronization with branches
       # run: |
          #fetching all branch to git runner to see locally
        #  git fetch --all
          #checking all fetched branch or confirming it
         # git branch -a
          #git checkout master
          # since git runner didnt recognize "hp" remote we use standard <origin>, for custom we need to define "hp"
          # git remote add hp git@github.com:Kewat-Ops/dev.git (for SSH)
          # git fetch hp
          #git pull origin srijan
          #git push origin master
          #git checkout srijan

      - name: deploying code
        run: |
          echo -e "Deploying codes...\nHold on:\nProgressing....\nSuccessfully deployed..."
          echo -e "Pulling images...\nProgressing....."
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-python:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-node:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-go:latest
          echo -e "Successfully pulled images..."
          echo -e "Composing docker files....\nInitializing & untag unused images....."
          docker image prune -f
          echo -e "Succesfully untagged unused images...\nStart composing files..."
          docker compose -f docker-compose.yml --profile runner up -d --remove-orphans

# Zero-downtime (Automated roll back ) & scaling
      - name: Rolling back & scaling container on Health failure
        run: |
          #here in loops we should use image name not container or service (docker_user/dev-python:dev-node:dev-go)
          for SVC in python node go; do
            # Logic for finding container id
            cid=$(docker ps -q -f "label=com.docker.compose.service=$SVC-service")
            # this logic checks if container id is found/running or empty (-n: non-empty, -z: empty) 
            if [ -n "$cid" ]; then
              # Logic for checking container health
              status=$(docker inspect --format='{{json .State.Health.Status}}' $cid)
              if [[ "$status" != "\"healthy\"" ]]; then
                echo -e " $SVC is unhealthy\nRolling back to stable..."
                # restart only the failing services,not whole stack (-s: stop, -f: force removal)
                docker compose rm -sf ${SVC}-service
                docker pull ${{ secrets.DOCKER_USERNAME }}/dev-${SVC}:stable
                # scaling container, brings service back with 2 replicas
                docker compose -f docker-compose.yml up -d --scale ${SVC}-service=2
              else
                echo -e "$SVC container is healthy"
              fi
            else
              echo -e "$SVC-container is not running"
            fi
          done

  alert:
    runs-on: ubuntu-latest
    needs: [deployment-phase]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: sending message
        run: |
          echo -e "Deployment has been failed on:\nBranch: ${{ github.ref }}"
