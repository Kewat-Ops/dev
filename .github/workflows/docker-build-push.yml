name: docker-build-push

jobs:

  docker-build-push:
    runs-on: self-hosted
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

# insnstalling dependencies cause its bare VM ubuntu
      - name: Installing python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'

      # using cache for pip
      - name: using cache for pip
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{hashFiles('python-dir/requirements.txt')}}
          restore-keys: ${{ runner.os }}-pip-

      # using caching for node & installing
      - name: Cache for node
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{hashFiles('node-dir/package.json')}}
          restore-keys: ${{ runner.os }}-node-

      - name: Installing node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # using caching for go & installing
      - name: Cache for go
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{hashFiles('go-dir/go.sum')}}
          restore-keys: ${{ runner.os }}-go-

      - name: downloading go modules
        run: |
          cd go-dir
          go mod download

      - name: Installing go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

# setting up the library QEMU actions for supported platforms
      - name: setting up QEMU action
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

# using cache for buildx i.e caching building images
      - name: cache for buildx
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-new
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

# setting up buildx environment
      - name: setting up buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

#setting docker login environment
      - name: setting docker login environment
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#setting docker build-push environment
      - name: setting docker build-push python-image enviornment
        uses: docker/build-push-action@v4
        with:
          context: ./python-dir
          file: ./python-dir/dockerfile-python
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dev-python:latest
            ${{ secrets.DOCKER_USERNAME }}/dev-python:${{ github.sha }}

          # using cache for image layers
          #cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-python:cache
          #cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-python:cache,mode=min

          # using local caching for image layers, upper one gives PUT request failure
          cache-from: type=local,src=/tmp/.buildx-cache-new
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

          # removing linux/arm64 cause QEMU isnt supporting both arch
          platforms: linux/amd64

# python-imgae scanning for vulnerabilities for issue
      - name: Scanning python images
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME}}/dev-python:latest
          severity: HIGH, CRITICAL

# Testing & promoting python-image stable for production ready & safety from broken builds
      - name: Testing python container
        run: |
          cd python-dir
          pip install -r requirements.txt
          pip install pytest
          pytest tests
          #docker run --rm ${{ secrets.DOCKER_USERNAME }}/dev-python:latest pytest

      #pulling python images instead of building existing images
      - name: Pulling python images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-python:latest

      - name: promoting stable python image & broken builds safety
        if: success()
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/dev-python:latest ${{ secrets.DOCKER_USERNAME }}/dev-python:stable
          docker push ${{ secrets.DOCKER_USERNAME }}/dev-python:stable

#setting docker build-push environment
      - name: setting docker build-push node-image enviornment
        uses: docker/build-push-action@v4
        with:
          context: ./node-dir
          file: ./node-dir/dockerfile-node
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dev-node:latest
            ${{ secrets.DOCKER_USERNAME }}/dev-node:${{ github.sha }}

          # using cache for image layers
          #cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-node:cache
          #cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-node:cache,mode=min

          # using local caching for image layers, upper one gives PUT request failure
          cache-from: type=local,src=/tmp/.buildx-cache-new
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

          # removing linux/arm64 cause QEMU isnt supporting both arch
          platforms: linux/amd64

# node-imgae scanning for vulnerabilities for issue
      - name: Scanning node images
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME}}/dev-node:latest
          severity: HIGH, CRITICAL

# Testing & promoting node-image stable for production ready & safety from broken builds
      - name: Testing node container
        run: |
          cd node-dir
          npm install
          npm test
          #docker run --rm ${{ secrets.DOCKER_USERNAME }}/dev-node:latest npm test

      #pulling python node instead of building existing images
      - name: Pulling node images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-node:latest

      - name: promoting stable node image & broken builds safety
        if: success()
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/dev-node:latest ${{ secrets.DOCKER_USERNAME }}/dev-node:stable
          docker push ${{ secrets.DOCKER_USERNAME }}/dev-node:stable

#setting docker build-push environment
      - name: setting docker build-push go-image enviornment
        uses: docker/build-push-action@v4
        with:
          context: ./go-dir
          file: ./go-dir/dockerfile-go
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dev-go:latest
            ${{ secrets.DOCKER_USERNAME }}/dev-go:${{ github.sha }}

          # using cache for image layers
          #cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-go:cache
          #cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-go:cache,mode=min

          # using local caching for image layers, upper one gives PUT request failure
          cache-from: type=local,src=/tmp/.buildx-cache-new
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

          # removing linux/arm64 cause QEMU isnt supporting both arch
          platforms: linux/amd64

# go-imgae scanning for vulnerabilities for issue
      - name: Scanning go images
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME}}/dev-go:latest
          severity: HIGH, CRITICAL

# Testing & promoting go-image stable for production ready & safety from broken builds
      - name: Testing go container
        run: |
          cd go-dir
          go test ./...
          #docker run --rm ${{ secrets.DOCKER_USERNAME }}/dev-go:latest go test ./...

      #pulling python images instead of building existing images
      - name: Pulling python images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/dev-go:latest

      - name: promoting stable go image & broken builds safety
        if: success()
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/dev-go:latest ${{ secrets.DOCKER_USERNAME }}/dev-go:stable
          docker push ${{ secrets.DOCKER_USERNAME }}/dev-go:stable
