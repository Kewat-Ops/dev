# using for intra-services, communicating services eachother
networks:
  devops-net:
    driver: bridge

# using docker secrets for outside of github CI workflows, for multiple VM or multiple node
secrets:
  db_password:
    external: true

services:

  python-service:
    build:
      context: ./python-dir
      dockerfile: dockerfile-python
    container_name: python-container
    ports:
      - "5000:5000"
#checking python-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/python"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

  node-service:
    build:
      context: ./node-dir
      dockerfile: dockerfile-node
    container_name: node-container
    ports:
      - "3000:3000"
#checking node-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/node"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

  go-service:
    build:
      context: ./go-dir
      dockerfile: dockerfile-go
    container_name: go-container
    ports:
      - "8000:8000"
#checking go-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/go"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      python-service:
        condition: service_healthy
      node-service:
        condition: service_healthy
      go-service:
        condition: service_healthy
    networks:
      - devops-net
