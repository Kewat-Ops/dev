networks:
  devops-net:
    driver: bridge

services:

  python-service:
    build:
      context: ./python-dir
      dockerfile: dockerfile-python
    #container_name: python-container
    ports:
      - "5000:5000"
#checking python-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/python"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

  node-service:
    build:
      context: ./node-dir
      dockerfile: dockerfile-node
    #container_name: node-container
    ports:
      - "3000:3000"
#checking node-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/node"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

  go-service:
    build:
      context: ./go-dir
      dockerfile: dockerfile-go
    #container_name: go-container
    ports:
      - "8000:8000"
#checking go-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/go"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

  nginx-proxy:
    image: nginx:latest
    #container_name: nginx-proxy
    #network_mode: host
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      python-service:
        condition: service_healthy
      node-service:
        condition: service_healthy
      go-service:
        condition: service_healthy
    networks:
      - devops-net
