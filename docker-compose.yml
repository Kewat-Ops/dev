# using for intra-services, communicating services eachother
networks:
  devops-net:
    # using overlay , cause swarm sees overlay rather than bridge, using this -we can communicate with multiple host-node
    driver: overlay

 # using docker secrets for outside of github CI workflows, for multiple VM or multiple node
secrets:
  db_password:
    external: true

services:

  python-service:
    # build is for locally and save images in pc
    #build:
    #  context: ./python-dir
    #  dockerfile: dockerfile-python

    # image field is for CICD github action, wont save images in pc
    image: ${DOCKER_USERNAME}/dev-python:latest
    #container_name: python-container

    # In CICD script already added scaling services for stable image tag, we again adding here for handles scaling
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

      # using resource limits, so that replicas wont starve each-other under load
      resources:
        limits:
          # max 50% of cpu core
          cpus: "0.50"
          # max 512 MB of RAM
          memory: "512M"
        reservations:
          # gurantee 50% of cpu core
          cpus: "0.25"
          # gurantee 512 MB of RAM
          memory: "256M"

    ports:
      - "5000:5000"
#checking python-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/python"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

  node-service:
    # build is for locally and save images in pc
    #build:
    #  context: ./node-dir
    #  dockerfile: dockerfile-node

    # image field is for CICD github action, wont save images in pc
    image: ${DOCKER_USERNAME}/dev-node:latest
    #container_name: node-container

    # In CICD script already added scaling services for stable image tag, we again adding here for handles scaling
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

      # using resource limits, so that replicas wont starve each-other under load
      resources:
        limits:
          # max 50% of cpu core
          cpus: "0.50"
          # max 512 MB of RAM
          memory: "512M"
        reservations:
          # gurantee 50% of cpu core
          cpus: "0.25"
          # gurantee 512 MB of RAM
          memory: "256M"

    ports:
      - "3000:3000"
#checking node-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/node"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

  go-service:
    # build is for locally and save images in pc
    #build:
    # context: ./go-dir
    # dockerfile: dockerfile-go

    # image field is for CICD github action, wont save images in pc
    image: ${DOCKER_USERNAME}/dev-go:latest
    #container_name: go-container

    # In CICD script already added scaling services for stable image tag, we again adding here for handles scaling
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

      # using resource limits, so that replicas wont starve each-other under load
      resources:
        limits:
          # max 50% of cpu core
          cpus: "0.50"
          # max 512 MB of RAM
          memory: "512M"
        reservations:
          # gurantee 50% of cpu core
          cpus: "0.25"
          # gurantee 512 MB of RAM
          memory: "256M"

    ports:
      - "8000:8000"
#checking go-container health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/go"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - devops-net

    secrets:
      - db_password

# using reverse proxy
  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

# unless all containers are healthy, nginx-proxy service won't starts
    depends_on:
      - python-service
      - node-service
      - go-service
    networks:
      - devops-net

# using prometheus for storing metrics, behaves like blackbox
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - devops-net

#using grafana to visualize metrics with dashboard layer, graphical visualization
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - devops-net

# using jaeger for troubleshooter- tells where and why happened
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      # jaeger UI
      - "16686:16686"
      # Agent
      - "6831:6831/udp"
    networks:
      - devops-net
